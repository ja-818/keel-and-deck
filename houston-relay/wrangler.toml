name = "houston-relay"
main = "src/index.ts"
compatibility_date = "2024-12-30"
compatibility_flags = ["nodejs_compat"]
# Disable the free `*.workers.dev` subdomain. Production traffic enters
# only through the `tunnel.gethouston.ai` custom domain below, so
# clients can't accidentally hit a second URL with the same
# Durable Object state.
workers_dev = false

# Production custom domain. `custom_domain = true` tells Wrangler to
# register this as a Cloudflare "Custom Domain" — CF auto-provisions
# the proxied DNS record and attaches the Worker.
routes = [
  { pattern = "tunnel.gethouston.ai", custom_domain = true }
]

[[durable_objects.bindings]]
name = "TUNNEL"
class_name = "TunnelRoom"

# Migration chain. Prod already applied the `deleted_classes` step for
# the legacy `SyncRoom` class under this tag; removing it here so
# local tests (miniflare, no SyncRoom exists) don't error.
[[migrations]]
tag = "tunnel-v1"
new_sqlite_classes = ["TunnelRoom"]

[vars]
# Public host. Used by /allocate to build the `publicHost` field so
# desktops know where to build WSS register URLs + QR codes.
RELAY_PUBLIC_HOST = "tunnel.gethouston.ai"

# ---------------------------------------------------------------------------
# Secrets (set via `wrangler secret put`):
#   TUNNEL_SHARED_SECRET  — HMAC key for tunnel allocation tokens
# ---------------------------------------------------------------------------

# Static assets binding — serves the mobile PWA from the SAME origin
# as the tunnel API. This eliminates the cross-origin third-party
# relationship that would otherwise trigger iOS Safari's Advanced
# Privacy Protection (silent throttling of WebSocket frames + fetch).
#
# `run_worker_first = true` so the Worker decides routing: API paths
# (/allocate, /pair, /e/) handled inline; anything else delegated to
# `env.ASSETS.fetch(request)` which serves the PWA bundle (or
# `index.html` as SPA fallback for unknown paths so React Router can
# take over).
[assets]
directory = "../mobile/dist"
binding = "ASSETS"
not_found_handling = "single-page-application"
run_worker_first = true

[env.staging]
name = "houston-relay-staging"
workers_dev = false
routes = [
  { pattern = "tunnel-staging.gethouston.ai", custom_domain = true }
]
vars = { RELAY_PUBLIC_HOST = "tunnel-staging.gethouston.ai" }

[env.staging.assets]
directory = "../mobile/dist"
binding = "ASSETS"
not_found_handling = "single-page-application"
run_worker_first = true
