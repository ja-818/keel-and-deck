# Houston macOS Release Workflow
#
# Triggered by pushing a version tag (e.g. `git tag v0.3.0 && git push --tags`).
#
# Signing chain:
#   1. tauri-action builds, signs, notarizes, and staples the .app
#   2. tauri-action creates and signs the DMG (but does NOT notarize it — known Tauri gap)
#   3. This workflow notarizes and staples the DMG (with retry)
#   4. Full verification: .app signature, .app notarization, DMG signature, DMG notarization,
#      .app-inside-DMG integrity check
#   5. All artifacts uploaded to a draft GitHub Release (publish manually after QA)
#
# Required secrets:
#   TAURI_SIGNING_PRIVATE_KEY          — Tauri updater key (generate: `pnpm tauri signer generate`)
#   TAURI_SIGNING_PRIVATE_KEY_PASSWORD — Password for the updater key
#   APPLE_CERTIFICATE                  — Base64-encoded .p12 certificate
#   APPLE_CERTIFICATE_PASSWORD         — Password for the .p12
#   APPLE_SIGNING_IDENTITY             — e.g. "Developer ID Application: Your Name (TEAM_ID)"
#   APPLE_API_ISSUER                   — App Store Connect API issuer ID
#   APPLE_API_KEY                      — App Store Connect API key ID
#   APPLE_API_KEY_CONTENT              — Base64-encoded .p8 key file
#   POSTHOG_KEY                        — PostHog project API key (client-side, public-safe)
#   POSTHOG_HOST                       — PostHog ingest host (e.g. https://us.i.posthog.com)
#   SUPABASE_URL                       — Supabase project URL
#   SUPABASE_ANON_KEY                  — Supabase anon key (client-side, RLS-gated)
#   SENTRY_DSN                         — Sentry crash reporting DSN

name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-macos:
    runs-on: macos-latest
    timeout-minutes: 60
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Full history + all tags so the release-notes step can diff
          # against the previous release tag (`git log <prev>..HEAD`).
          # Default is shallow depth=1 with no tags, which would make the
          # notes builder fall through to the HEAD~50 fallback every time.
          fetch-depth: 0
          fetch-tags: true

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install

      - name: Setup Rust (universal macOS targets)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - name: Cache Rust artifacts
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            app/src-tauri/target
          key: ${{ runner.os }}-cargo-universal-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-universal-

      - name: Write Apple API key to disk
        run: |
          mkdir -p ~/.appstoreconnect/private_keys
          echo "${{ secrets.APPLE_API_KEY_CONTENT }}" | base64 --decode > ~/.appstoreconnect/private_keys/AuthKey_${{ secrets.APPLE_API_KEY }}.p8

      # Build the engine sidecar for BOTH macOS architectures BEFORE the
      # Tauri app build.
      #
      # Tauri's universal-apple-darwin build invokes cargo once per real
      # triple (aarch64 + x86_64) and expects per-triple sidecars at
      # `src-tauri/binaries/houston-engine-<triple>`. `build.rs` copies them
      # there, but it needs the underlying binary to exist for the triple
      # cargo is currently compiling for. So we build BOTH up front.
      #
      # Shipping an Intel-only or arm64-only engine would break half of our
      # Mac users — so a missing triple fails hard here rather than producing
      # a silently-broken DMG.
      - name: Build houston-engine sidecar (aarch64 + x86_64) + lipo universal
        run: |
          set -euo pipefail
          for TRIPLE in aarch64-apple-darwin x86_64-apple-darwin; do
            echo "=== Building houston-engine for $TRIPLE ==="
            cargo build --release --target "$TRIPLE" -p houston-engine-server
            test -x "target/$TRIPLE/release/houston-engine" \
              || { echo "::error::engine binary missing for $TRIPLE"; exit 1; }
          done

          # Tauri's `--target universal-apple-darwin` bundler looks for a
          # SINGLE fat binary at `binaries/houston-engine-universal-apple-darwin`.
          # `build.rs` stages per-triple binaries during the per-arch cargo
          # invocations (aarch64 + x86_64), but there's no cargo target for
          # "universal-apple-darwin" — so nothing stages the fat one.
          # We lipo the two per-arch outputs manually here, before tauri-action
          # runs, so the bundler finds it.
          echo "=== Lipo universal sidecar ==="
          mkdir -p app/src-tauri/binaries
          lipo -create \
            target/aarch64-apple-darwin/release/houston-engine \
            target/x86_64-apple-darwin/release/houston-engine \
            -output app/src-tauri/binaries/houston-engine-universal-apple-darwin
          chmod +x app/src-tauri/binaries/houston-engine-universal-apple-darwin
          lipo -info app/src-tauri/binaries/houston-engine-universal-apple-darwin

          ls -la \
            target/aarch64-apple-darwin/release/houston-engine \
            target/x86_64-apple-darwin/release/houston-engine \
            app/src-tauri/binaries/houston-engine-universal-apple-darwin

      # Build only — no release creation (no tagName).
      # tauri-action handles certificate import, code signing, .app notarization + stapling.
      #
      # `--target universal-apple-darwin` produces one .app / .dmg whose
      # binaries are fat (arm64 + x86_64). Tauri invokes cargo twice under
      # the hood — once per real triple — and lipos the outputs. Our engine
      # sidecar is handled the same way via the per-triple
      # `binaries/houston-engine-<triple>` files staged by `build.rs`.
      # Bundle output lands under `target/universal-apple-darwin/release/bundle/`.
      - name: Build Tauri app (universal)
        uses: tauri-apps/tauri-action@v0
        with:
          projectPath: app
          args: --target universal-apple-darwin
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
          APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
          APPLE_API_KEY_PATH: ~/.appstoreconnect/private_keys/AuthKey_${{ secrets.APPLE_API_KEY }}.p8
          POSTHOG_KEY: ${{ secrets.POSTHOG_KEY }}
          POSTHOG_HOST: ${{ secrets.POSTHOG_HOST }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          SENTRY_DSN: ${{ secrets.SENTRY_DSN }}

      - name: Locate build artifacts
        id: artifacts
        run: |
          # Cargo workspace: target dir is at workspace root, not per-crate.
          # Universal builds emit under `target/universal-apple-darwin/release/bundle/`
          # (NOT `target/release/bundle/` — that path is only populated by a
          # default-triple build).
          BUNDLE="target/universal-apple-darwin/release/bundle"

          APP=$(ls -d "$BUNDLE/macos/"*.app 2>/dev/null | head -1)
          DMG=$(ls -t "$BUNDLE/dmg/"*.dmg 2>/dev/null | head -1)
          TAR=$(ls -t "$BUNDLE/macos/"*.app.tar.gz 2>/dev/null | head -1)
          SIG=$(ls -t "$BUNDLE/macos/"*.app.tar.gz.sig 2>/dev/null | head -1)

          missing=()
          [ -e "$APP" ] || missing+=(".app")
          [ -f "$DMG" ] || missing+=(".dmg")
          [ -f "$TAR" ] || missing+=(".app.tar.gz")
          [ -f "$SIG" ] || missing+=(".app.tar.gz.sig")

          if [ ${#missing[@]} -gt 0 ]; then
            echo "::error::Missing build artifacts: ${missing[*]}"
            echo "--- Bundle contents ---"
            ls -laR "$BUNDLE" || true
            exit 1
          fi

          echo "app=$APP" >> "$GITHUB_OUTPUT"
          echo "dmg=$DMG" >> "$GITHUB_OUTPUT"
          echo "tar=$TAR" >> "$GITHUB_OUTPUT"
          echo "sig=$SIG" >> "$GITHUB_OUTPUT"

          echo "Artifacts:"
          echo "  .app:        $APP"
          echo "  .dmg:        $DMG"
          echo "  .app.tar.gz: $TAR"
          echo "  .sig:        $SIG"

      - name: Verify .app signing and notarization
        run: |
          echo "=== Code signature ==="
          codesign -vvv --deep --strict "${{ steps.artifacts.outputs.app }}"

          echo "=== Notarization staple ==="
          xcrun stapler validate "${{ steps.artifacts.outputs.app }}"

      # Explicit assertions on the bundled `houston-engine` sidecar.
      # `--deep` above validates all embedded binaries, but a regression in
      # tauri-action could silently ship an ad-hoc-signed or
      # hardened-runtime-less sidecar — Gatekeeper would then quarantine-kill
      # it on first launch for upgraders and the app hangs at splash.
      # Fail the release if any of these invariants drifts.
      - name: Verify engine sidecar signing
        run: |
          APP="${{ steps.artifacts.outputs.app }}"

          # Tauri strips the triple suffix on bundle; fall back to glob if it doesn't.
          SIDECAR="$APP/Contents/MacOS/houston-engine"
          if [ ! -f "$SIDECAR" ]; then
            SIDECAR=$(find "$APP/Contents" -type f -name 'houston-engine*' ! -name '*.dSYM*' | head -1)
          fi

          if [ -z "$SIDECAR" ] || [ ! -x "$SIDECAR" ]; then
            echo "::error::engine sidecar missing or not executable inside .app"
            echo "--- .app contents ---"
            find "$APP/Contents" -type f | head -50
            exit 1
          fi
          echo "Sidecar: $SIDECAR"

          echo "=== 1. Signature valid ==="
          codesign -vvv "$SIDECAR"

          echo "=== 2. Signed with Developer ID (not ad-hoc) ==="
          AUTH=$(codesign -dvv "$SIDECAR" 2>&1 | grep '^Authority=' | head -1)
          echo "$AUTH"
          if ! echo "$AUTH" | grep -q 'Developer ID Application'; then
            echo "::error::sidecar not signed with Developer ID — Gatekeeper will kill it on first launch"
            codesign -dvv "$SIDECAR" 2>&1 || true
            exit 1
          fi

          echo "=== 3. Hardened runtime enabled ==="
          FLAGS=$(codesign -dv "$SIDECAR" 2>&1 | grep -E '^CodeDirectory.*flags=' | head -1)
          echo "$FLAGS"
          if ! echo "$FLAGS" | grep -q 'runtime'; then
            echo "::error::sidecar missing hardened runtime flag — required for notarization + subprocess execution"
            codesign -dv "$SIDECAR" 2>&1 || true
            exit 1
          fi

          echo "=== 4. Universal (fat) binary — both arm64 + x86_64 ==="
          LIPO=$(lipo -info "$SIDECAR" 2>&1 || true)
          echo "$LIPO"
          if ! echo "$LIPO" | grep -q 'arm64'; then
            echo "::error::sidecar missing arm64 slice — Apple Silicon users will fail to launch"
            exit 1
          fi
          if ! echo "$LIPO" | grep -q 'x86_64'; then
            echo "::error::sidecar missing x86_64 slice — Intel Mac users will fail to launch (regression to v0.x universal rollout)"
            exit 1
          fi

          echo "=== Sidecar checks passed ==="

      - name: Notarize DMG
        timeout-minutes: 25
        run: |
          DMG="${{ steps.artifacts.outputs.dmg }}"
          KEY=~/.appstoreconnect/private_keys/AuthKey_${{ secrets.APPLE_API_KEY }}.p8

          for attempt in 1 2 3; do
            echo "=== Attempt $attempt/3 ==="
            if xcrun notarytool submit "$DMG" \
                --key-id "${{ secrets.APPLE_API_KEY }}" \
                --key "$KEY" \
                --issuer "${{ secrets.APPLE_API_ISSUER }}" \
                --wait; then
              echo "Notarization succeeded"
              xcrun stapler staple "$DMG"
              exit 0
            fi

            if [ "$attempt" -eq 3 ]; then
              echo "::error::DMG notarization failed after 3 attempts"
              exit 1
            fi

            echo "Retrying in 30s..."
            sleep 30
          done

      - name: Verify complete signing chain
        run: |
          DMG="${{ steps.artifacts.outputs.dmg }}"

          echo "=== 1. DMG code signature ==="
          codesign -vvv "$DMG"

          echo "=== 2. DMG notarization staple ==="
          xcrun stapler validate "$DMG"

          echo "=== 3. DMG Gatekeeper assessment ==="
          spctl -a -t open --context context:primary-signature -vv "$DMG" \
            || echo "::warning::spctl returned non-zero (common on CI — not a real issue if steps 1-2 passed)"

          echo "=== 4. .app inside DMG ==="
          MOUNT=$(mktemp -d)
          hdiutil attach "$DMG" -mountpoint "$MOUNT" -nobrowse -quiet

          INNER_APP=$(ls -d "$MOUNT/"*.app 2>/dev/null | head -1)
          if [ -z "$INNER_APP" ]; then
            echo "::error::No .app found inside DMG"
            hdiutil detach "$MOUNT" -quiet || true
            exit 1
          fi

          codesign -vvv --deep --strict "$INNER_APP"
          xcrun stapler validate "$INNER_APP"
          hdiutil detach "$MOUNT" -quiet

          echo "=== All checks passed ==="

      - name: Generate checksums
        run: |
          shasum -a 256 \
            "${{ steps.artifacts.outputs.dmg }}" \
            "${{ steps.artifacts.outputs.tar }}" \
            > checksums-sha256.txt
          cat checksums-sha256.txt

      # Resolve `release-notes.md`. Two paths:
      #
      # 1. Author-written notes at `.github/release-notes/<version>.md`
      #    — preferred. Whoever drives the release (Claude in our flow,
      #    or a human) drops a markdown file alongside the version-bump
      #    commit, tagged commit, etc. Used verbatim.
      #
      # 2. Auto-generated fallback grouping conventional-commit subjects
      #    in `git log <prev-tag>..HEAD` by prefix:
      #      Features (feat) / Fixes (fix) / Docs (docs) /
      #      CI & infra (ci) / Changes (refactor|perf|style|test)
      #    `chore:` and untyped commits are hidden. Use this when a fast
      #    hotfix doesn't justify hand-written notes.
      #
      # Either way the release stays a draft, so the author can still
      # polish before publishing.
      - name: Build release notes
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          AUTHORED=".github/release-notes/${VERSION}.md"

          if [ -f "$AUTHORED" ]; then
            echo "Using author-written notes from $AUTHORED"
            cp "$AUTHORED" release-notes.md
          else
            echo "No $AUTHORED — falling back to auto-generated changelog"

            PREV_TAG=$(git tag --sort=-v:refname --list 'v*' | grep -v "^${GITHUB_REF_NAME}$" | head -1)
            if [ -z "$PREV_TAG" ]; then
              echo "No previous tag; diffing against HEAD~50"
              RANGE="HEAD~50..HEAD"
              COMPARE=""
            else
              RANGE="$PREV_TAG..HEAD"
              COMPARE="**Full changelog**: https://github.com/${{ github.repository }}/compare/$PREV_TAG...${GITHUB_REF_NAME}"
            fi

            section() {
              local title="$1"; shift
              local pattern="$1"; shift
              local matches
              matches=$(git log "$RANGE" --no-merges --pretty='- %s' | grep -E "^- ($pattern)(\([^)]+\))?:" || true)
              if [ -n "$matches" ]; then
                printf '\n### %s\n\n%s\n' "$title" "$matches"
              fi
            }

            {
              echo "## Houston v$VERSION"
              section "Features"  "feat"
              section "Fixes"     "fix"
              section "Docs"      "docs"
              section "CI & infra" "ci"
              section "Changes"   "refactor|perf|style|test"
              echo
              # Keep the upgrade reminder everyone needs — drag-install
              # doesn't reliably replace a running .app.
              echo "### Before you upgrade"
              echo ""
              echo "- Quit Houston before installing. macOS doesn't always replace a running app. If in doubt: \`rm -rf /Applications/Houston.app\` and drag the new copy in."
              echo ""
              if [ -n "$COMPARE" ]; then
                echo "$COMPARE"
              fi
            } > release-notes.md
          fi

          echo "----- release-notes.md -----"
          cat release-notes.md
          echo "----- end -----"

      - name: Generate updater manifest
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          TAR_NAME=$(basename "${{ steps.artifacts.outputs.tar }}")
          SIG=$(cat "${{ steps.artifacts.outputs.sig }}")
          URL="https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/$TAR_NAME"

          # Four keys required. We ship ONE universal tarball that runs on
          # both Apple Silicon and Intel, so every platform key points at the
          # same URL + signature:
          #   - darwin-aarch64 / darwin-aarch64-app  (Apple Silicon)
          #   - darwin-x86_64  / darwin-x86_64-app   (Intel)
          # Tauri updater checks the `-app` suffix first, then falls back to
          # generic; Intel users on older Houston installs hit `darwin-x86_64`
          # and need it present or they never see the update prompt.
          jq -n \
            --arg v "$VERSION" \
            --arg sig "$SIG" \
            --arg url "$URL" \
            --arg date "$(date -u +%Y-%m-%dT%H:%M:%S.000Z)" \
            --arg notes "See the assets to download and install this version." \
            '{
              version: $v,
              notes: $notes,
              pub_date: $date,
              platforms: {
                "darwin-aarch64": {
                  signature: $sig,
                  url: $url
                },
                "darwin-aarch64-app": {
                  signature: $sig,
                  url: $url
                },
                "darwin-x86_64": {
                  signature: $sig,
                  url: $url
                },
                "darwin-x86_64-app": {
                  signature: $sig,
                  url: $url
                }
              }
            }' > latest.json

          echo "latest.json:"
          cat latest.json

      - name: Create draft release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${GITHUB_REF_NAME#v}"

          gh release create "$GITHUB_REF_NAME" \
            --title "Houston v$VERSION" \
            --notes-file release-notes.md \
            --draft \
            "${{ steps.artifacts.outputs.dmg }}" \
            "${{ steps.artifacts.outputs.tar }}" \
            "${{ steps.artifacts.outputs.sig }}" \
            latest.json \
            checksums-sha256.txt

          echo "::notice::Draft release created — review notes then publish at https://github.com/${{ github.repository }}/releases/tag/$GITHUB_REF_NAME"
