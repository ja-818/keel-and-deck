# Houston macOS Release Workflow
#
# Triggered by pushing a version tag (e.g. `git tag v0.3.0 && git push --tags`).
#
# Signing chain:
#   1. tauri-action builds, signs, notarizes, and staples the .app
#   2. tauri-action creates and signs the DMG (but does NOT notarize it — known Tauri gap)
#   3. This workflow notarizes and staples the DMG (with retry)
#   4. Full verification: .app signature, .app notarization, DMG signature, DMG notarization,
#      .app-inside-DMG integrity check
#   5. All artifacts uploaded to a draft GitHub Release (publish manually after QA)
#
# Required secrets:
#   TAURI_SIGNING_PRIVATE_KEY          — Tauri updater key (generate: `pnpm tauri signer generate`)
#   TAURI_SIGNING_PRIVATE_KEY_PASSWORD — Password for the updater key
#   APPLE_CERTIFICATE                  — Base64-encoded .p12 certificate
#   APPLE_CERTIFICATE_PASSWORD         — Password for the .p12
#   APPLE_SIGNING_IDENTITY             — e.g. "Developer ID Application: Your Name (TEAM_ID)"
#   APPLE_API_ISSUER                   — App Store Connect API issuer ID
#   APPLE_API_KEY                      — App Store Connect API key ID
#   APPLE_API_KEY_CONTENT              — Base64-encoded .p8 key file
#   APTABASE_APP_KEY                   — Aptabase analytics key
#   SENTRY_DSN                         — Sentry crash reporting DSN

name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-macos:
    runs-on: macos-latest
    timeout-minutes: 60
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Full history + all tags so the release-notes step can diff
          # against the previous release tag (`git log <prev>..HEAD`).
          # Default is shallow depth=1 with no tags, which would make the
          # notes builder fall through to the HEAD~50 fallback every time.
          fetch-depth: 0
          fetch-tags: true

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust artifacts
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            app/src-tauri/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Write Apple API key to disk
        run: |
          mkdir -p ~/.appstoreconnect/private_keys
          echo "${{ secrets.APPLE_API_KEY_CONTENT }}" | base64 --decode > ~/.appstoreconnect/private_keys/AuthKey_${{ secrets.APPLE_API_KEY }}.p8

      # Build the engine sidecar BEFORE the Tauri app build. The app's
      # `build.rs` stages `target/release/houston-engine` into
      # `src-tauri/binaries/houston-engine-<triple>` for Tauri's `externalBin`
      # to bundle. Without this step the Tauri build fails with
      # `resource path 'binaries/houston-engine-...' doesn't exist` — which
      # silently broke v0.3.3's release pipeline.
      - name: Build houston-engine sidecar
        run: |
          TRIPLE="aarch64-apple-darwin"
          cargo build --release --target "$TRIPLE" -p houston-engine-server
          # The target-specific cargo output lives at `target/<triple>/release/`.
          # `build.rs` also looks at `target/release/` (no triple) so mirror the
          # binary there so both paths resolve.
          mkdir -p target/release
          cp "target/$TRIPLE/release/houston-engine" target/release/houston-engine
          ls -la target/release/houston-engine "target/$TRIPLE/release/houston-engine"

      # Build only — no release creation (no tagName).
      # tauri-action handles certificate import, code signing, .app notarization + stapling.
      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        with:
          projectPath: app
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
          APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
          APPLE_API_KEY_PATH: ~/.appstoreconnect/private_keys/AuthKey_${{ secrets.APPLE_API_KEY }}.p8
          APTABASE_APP_KEY: ${{ secrets.APTABASE_APP_KEY }}
          SENTRY_DSN: ${{ secrets.SENTRY_DSN }}

      - name: Locate build artifacts
        id: artifacts
        run: |
          # Cargo workspace: target dir is at workspace root, not per-crate.
          # tauri-action emits bundles under `target/release/bundle/`.
          BUNDLE="target/release/bundle"

          APP=$(ls -d "$BUNDLE/macos/"*.app 2>/dev/null | head -1)
          DMG=$(ls -t "$BUNDLE/dmg/"*.dmg 2>/dev/null | head -1)
          TAR=$(ls -t "$BUNDLE/macos/"*.app.tar.gz 2>/dev/null | head -1)
          SIG=$(ls -t "$BUNDLE/macos/"*.app.tar.gz.sig 2>/dev/null | head -1)

          missing=()
          [ -e "$APP" ] || missing+=(".app")
          [ -f "$DMG" ] || missing+=(".dmg")
          [ -f "$TAR" ] || missing+=(".app.tar.gz")
          [ -f "$SIG" ] || missing+=(".app.tar.gz.sig")

          if [ ${#missing[@]} -gt 0 ]; then
            echo "::error::Missing build artifacts: ${missing[*]}"
            echo "--- Bundle contents ---"
            ls -laR "$BUNDLE" || true
            exit 1
          fi

          echo "app=$APP" >> "$GITHUB_OUTPUT"
          echo "dmg=$DMG" >> "$GITHUB_OUTPUT"
          echo "tar=$TAR" >> "$GITHUB_OUTPUT"
          echo "sig=$SIG" >> "$GITHUB_OUTPUT"

          echo "Artifacts:"
          echo "  .app:        $APP"
          echo "  .dmg:        $DMG"
          echo "  .app.tar.gz: $TAR"
          echo "  .sig:        $SIG"

      - name: Verify .app signing and notarization
        run: |
          echo "=== Code signature ==="
          codesign -vvv --deep --strict "${{ steps.artifacts.outputs.app }}"

          echo "=== Notarization staple ==="
          xcrun stapler validate "${{ steps.artifacts.outputs.app }}"

      # Explicit assertions on the bundled `houston-engine` sidecar.
      # `--deep` above validates all embedded binaries, but a regression in
      # tauri-action could silently ship an ad-hoc-signed or
      # hardened-runtime-less sidecar — Gatekeeper would then quarantine-kill
      # it on first launch for upgraders and the app hangs at splash.
      # Fail the release if any of these invariants drifts.
      - name: Verify engine sidecar signing
        run: |
          APP="${{ steps.artifacts.outputs.app }}"

          # Tauri strips the triple suffix on bundle; fall back to glob if it doesn't.
          SIDECAR="$APP/Contents/MacOS/houston-engine"
          if [ ! -f "$SIDECAR" ]; then
            SIDECAR=$(find "$APP/Contents" -type f -name 'houston-engine*' ! -name '*.dSYM*' | head -1)
          fi

          if [ -z "$SIDECAR" ] || [ ! -x "$SIDECAR" ]; then
            echo "::error::engine sidecar missing or not executable inside .app"
            echo "--- .app contents ---"
            find "$APP/Contents" -type f | head -50
            exit 1
          fi
          echo "Sidecar: $SIDECAR"

          echo "=== 1. Signature valid ==="
          codesign -vvv "$SIDECAR"

          echo "=== 2. Signed with Developer ID (not ad-hoc) ==="
          AUTH=$(codesign -dvv "$SIDECAR" 2>&1 | grep '^Authority=' | head -1)
          echo "$AUTH"
          if ! echo "$AUTH" | grep -q 'Developer ID Application'; then
            echo "::error::sidecar not signed with Developer ID — Gatekeeper will kill it on first launch"
            codesign -dvv "$SIDECAR" 2>&1 || true
            exit 1
          fi

          echo "=== 3. Hardened runtime enabled ==="
          FLAGS=$(codesign -dv "$SIDECAR" 2>&1 | grep -E '^CodeDirectory.*flags=' | head -1)
          echo "$FLAGS"
          if ! echo "$FLAGS" | grep -q 'runtime'; then
            echo "::error::sidecar missing hardened runtime flag — required for notarization + subprocess execution"
            codesign -dv "$SIDECAR" 2>&1 || true
            exit 1
          fi

          echo "=== Sidecar checks passed ==="

      - name: Notarize DMG
        timeout-minutes: 25
        run: |
          DMG="${{ steps.artifacts.outputs.dmg }}"
          KEY=~/.appstoreconnect/private_keys/AuthKey_${{ secrets.APPLE_API_KEY }}.p8

          for attempt in 1 2 3; do
            echo "=== Attempt $attempt/3 ==="
            if xcrun notarytool submit "$DMG" \
                --key-id "${{ secrets.APPLE_API_KEY }}" \
                --key "$KEY" \
                --issuer "${{ secrets.APPLE_API_ISSUER }}" \
                --wait; then
              echo "Notarization succeeded"
              xcrun stapler staple "$DMG"
              exit 0
            fi

            if [ "$attempt" -eq 3 ]; then
              echo "::error::DMG notarization failed after 3 attempts"
              exit 1
            fi

            echo "Retrying in 30s..."
            sleep 30
          done

      - name: Verify complete signing chain
        run: |
          DMG="${{ steps.artifacts.outputs.dmg }}"

          echo "=== 1. DMG code signature ==="
          codesign -vvv "$DMG"

          echo "=== 2. DMG notarization staple ==="
          xcrun stapler validate "$DMG"

          echo "=== 3. DMG Gatekeeper assessment ==="
          spctl -a -t open --context context:primary-signature -vv "$DMG" \
            || echo "::warning::spctl returned non-zero (common on CI — not a real issue if steps 1-2 passed)"

          echo "=== 4. .app inside DMG ==="
          MOUNT=$(mktemp -d)
          hdiutil attach "$DMG" -mountpoint "$MOUNT" -nobrowse -quiet

          INNER_APP=$(ls -d "$MOUNT/"*.app 2>/dev/null | head -1)
          if [ -z "$INNER_APP" ]; then
            echo "::error::No .app found inside DMG"
            hdiutil detach "$MOUNT" -quiet || true
            exit 1
          fi

          codesign -vvv --deep --strict "$INNER_APP"
          xcrun stapler validate "$INNER_APP"
          hdiutil detach "$MOUNT" -quiet

          echo "=== All checks passed ==="

      - name: Generate checksums
        run: |
          shasum -a 256 \
            "${{ steps.artifacts.outputs.dmg }}" \
            "${{ steps.artifacts.outputs.tar }}" \
            > checksums-sha256.txt
          cat checksums-sha256.txt

      # Build `release-notes.md` by grouping conventional-commit subjects
      # between the previous tag and HEAD.
      #
      # We do commit-based, not PR-based, grouping because:
      #   - squash-merge policy means 1 commit ≈ 1 logical change
      #   - direct tag pushes (hotfixes, version bumps) are included
      #   - no dependency on GitHub's release-notes generator which can
      #     rate-limit, change format, or surface unwanted contributor
      #     spam
      #
      # Sections:
      #   - Features         (feat, feat(scope))
      #   - Fixes            (fix)
      #   - Docs             (docs)
      #   - CI & infra       (ci)
      #   - Changes          (refactor, perf, style, test — short list)
      # `chore:` and version-bump commits are intentionally hidden.
      #
      # Uses `git tag --sort=-v:refname` to find the previous semver
      # release; falls back to HEAD~50 if this is the first one.
      - name: Build release notes
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          PREV_TAG=$(git tag --sort=-v:refname --list 'v*' | grep -v "^${GITHUB_REF_NAME}$" | head -1)
          if [ -z "$PREV_TAG" ]; then
            echo "No previous tag; diffing against HEAD~50"
            RANGE="HEAD~50..HEAD"
            COMPARE=""
          else
            RANGE="$PREV_TAG..HEAD"
            COMPARE="**Full changelog**: https://github.com/${{ github.repository }}/compare/$PREV_TAG...${GITHUB_REF_NAME}"
          fi

          section() {
            local title="$1"; shift
            local pattern="$1"; shift
            local matches
            matches=$(git log "$RANGE" --no-merges --pretty='- %s' | grep -E "^- ($pattern)(\([^)]+\))?:" || true)
            if [ -n "$matches" ]; then
              printf '\n### %s\n\n%s\n' "$title" "$matches"
            fi
          }

          {
            echo "## Houston v$VERSION"
            section "Features"  "feat"
            section "Fixes"     "fix"
            section "Docs"      "docs"
            section "CI & infra" "ci"
            section "Changes"   "refactor|perf|style|test"
            echo
            # Keep the upgrade reminder everyone needs — drag-install
            # doesn't reliably replace a running .app.
            echo "### Before you upgrade"
            echo ""
            echo "- Quit Houston before installing. macOS doesn't always replace a running app. If in doubt: \`rm -rf /Applications/Houston.app\` and drag the new copy in."
            echo ""
            if [ -n "$COMPARE" ]; then
              echo "$COMPARE"
            fi
          } > release-notes.md

          echo "----- release-notes.md -----"
          cat release-notes.md
          echo "----- end -----"

      - name: Generate updater manifest
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          TAR_NAME=$(basename "${{ steps.artifacts.outputs.tar }}")
          SIG=$(cat "${{ steps.artifacts.outputs.sig }}")
          URL="https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/$TAR_NAME"

          # Both keys required: darwin-aarch64 (generic) and darwin-aarch64-app (.app bundle).
          # Tauri updater checks for the -app suffix first, falls back to generic.
          jq -n \
            --arg v "$VERSION" \
            --arg sig "$SIG" \
            --arg url "$URL" \
            --arg date "$(date -u +%Y-%m-%dT%H:%M:%S.000Z)" \
            --arg notes "See the assets to download and install this version." \
            '{
              version: $v,
              notes: $notes,
              pub_date: $date,
              platforms: {
                "darwin-aarch64": {
                  signature: $sig,
                  url: $url
                },
                "darwin-aarch64-app": {
                  signature: $sig,
                  url: $url
                }
              }
            }' > latest.json

          echo "latest.json:"
          cat latest.json

      - name: Create draft release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${GITHUB_REF_NAME#v}"

          gh release create "$GITHUB_REF_NAME" \
            --title "Houston v$VERSION" \
            --notes-file release-notes.md \
            --draft \
            "${{ steps.artifacts.outputs.dmg }}" \
            "${{ steps.artifacts.outputs.tar }}" \
            "${{ steps.artifacts.outputs.sig }}" \
            latest.json \
            checksums-sha256.txt

          echo "::notice::Draft release created — review notes then publish at https://github.com/${{ github.repository }}/releases/tag/$GITHUB_REF_NAME"
